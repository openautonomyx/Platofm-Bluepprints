name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  security-events: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  code-quality:
    name: Code quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install JS dependencies when package.json exists
        run: |
          if [ -f package-lock.json ]; then npm ci; fi
          if [ -f package.json ] && [ ! -f package-lock.json ]; then npm install; fi
      - name: Install Python tooling when pyproject exists
        run: |
          if [ -f pyproject.toml ]; then python -m pip install --upgrade pip ruff pytest; fi
      - name: Lint JavaScript/TypeScript
        run: |
          if [ -f package.json ] && npm run | grep -q " lint"; then npm run lint; else echo "No JS lint script configured"; fi
      - name: Typecheck JavaScript/TypeScript
        run: |
          if [ -f package.json ] && npm run | grep -q " typecheck"; then npm run typecheck; else echo "No JS typecheck script configured"; fi
      - name: Lint Python
        run: |
          if [ -f pyproject.toml ]; then ruff check .; else echo "No Python project configured"; fi
      - name: Test
        run: |
          if [ -f package.json ] && npm run | grep -q " test"; then npm test; fi
          if [ -f pyproject.toml ]; then pytest -q; fi
